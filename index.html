<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KetoMaster | The Green Plate</title>
    <style>
        :root { --leaf: #16a34a; --egg: #facc15; --chicken: #ea580c; --bg: #f8fafc; --dark: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding-bottom: 90px; }
        
        .header { padding: 25px 20px; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .search-bar { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; box-sizing: border-box; font-size: 16px; margin-top: 10px; outline: none; }
        .search-bar:focus { border-color: var(--leaf); }

        .recipe-list { padding: 15px; }
        .recipe-item { 
            display: flex; align-items: center; gap: 15px; background: white; 
            padding: 15px; border-radius: 18px; margin-bottom: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer;
        }
        .recipe-icon { width: 45px; height: 45px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        /* Detail Modal */
        #recipeOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: flex-end; }
        .overlay-content { background: white; width: 100%; max-height: 90vh; border-radius: 30px 30px 0 0; padding: 30px; box-sizing: border-box; overflow-y: auto; }

        .btn-action { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--leaf); color: white; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; background: #dcfce7; color: #166534; margin-right: 5px; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; border-top: 1px solid #e2e8f0; }
        .nav-item { flex: 1; text-align: center; padding-top: 15px; font-size: 11px; color: #64748b; cursor: pointer; }
        .nav-item.active { color: var(--leaf); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0">Green Keto Library</h2>
        <p style="margin:5px 0; font-size:14px; color:#64748b">High Protein • High Fiber • Zero Steak/Fish</p>
        <input type="text" id="searchInput" class="search-bar" placeholder="Search (e.g. Broccoli, Spinach, Salad)" onkeyup="filterRecipes()">
    </div>

    <div class="recipe-list" id="recipeContainer"></div>

    <div id="recipeOverlay" onclick="closeRecipe()">
        <div class="overlay-content" onclick="event.stopPropagation()">
            <div id="r-icon" style="font-size: 40px; margin-bottom: 10px;"></div>
            <h2 id="r-title" style="margin-top:0"></h2>
            <div id="r-tags" style="margin-bottom: 20px;"></div>
            
            <h3>Ingredients</h3>
            <ul id="r-ingredients" style="line-height: 1.8;"></ul>
            
            <h3>Preparation</h3>
            <p id="r-steps" style="line-height: 1.6; color: #475569;"></p>
            
            <button class="btn-action" onclick="addToShop()">+ Add to Shopping List</button>
            <button onclick="closeRecipe()" style="width:100%; padding:10px; background:none; border:none; color:#64748b; margin-top:10px;">Back to Recipes</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active">🥗<br>Recipes</div>
        <div class="nav-item">🛒<br>Shop</div>
        <div class="nav-item">📈<br>Weight</div>
    </div>

<script>
    // The "Green" Generator Logic
    const styles = ["Warm", "Zesty", "Garlic", "Crispy", "Steamed", "Herb", "Butter-Poached", "Chilled", "Spicy", "Roasted"];
    const proteins = ["Grilled Chicken", "Shredded Chicken", "Omelette Style Eggs", "Poached Eggs", "Hard Boiled Eggs", "Soft Scrambled Eggs"];
    const greens = ["Spinach", "Lettuce Mix", "Broccoli", "Mixed Greens", "Kale", "Zucchini Noodles", "Asparagus", "Cauliflower Rice"];

    let allRecipes = [];

    function generateRecipes() {
        let id = 0;
        styles.forEach(s => {
            proteins.forEach(p => {
                greens.forEach(g => {
                    allRecipes.push({
                        id: id++,
                        title: `${s} ${p} over ${g}`,
                        icon: p.includes("Chicken") ? "🍗" : "🍳",
                        ing: [p, g, "Olive Oil", "Pink Himalayan Salt", "Cracked Pepper", "Garlic Powder"],
                        steps: `Step 1: Prepare the ${p} to your liking. Step 2: Thoroughly wash and prep the ${g}. Step 3: Combine in a bowl and drizzle with olive oil for healthy fats. Step 4: Season with ${s.toLowerCase()} spices and enjoy your clean keto meal.`,
                        tags: ["Fiber-Rich", "Cleanse", "No-Red-Meat"]
                    });
                });
            });
        });
        renderRecipes(allRecipes);
    }

    function renderRecipes(list) {
        const container = document.getElementById('recipeContainer');
        container.innerHTML = list.map(r => `
            <div class="recipe-item" onclick="openRecipe(${r.id})">
                <div class="recipe-icon">${r.icon}</div>
                <div><b>${r.title}</b><br><small style="color:var(--leaf)">${r.ing[1]}</small></div>
            </div>
        `).join('');
    }

    function filterRecipes() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allRecipes.filter(r => r.title.toLowerCase().includes(term));
        renderRecipes(filtered);
    }

    function openRecipe(id) {
        const r = allRecipes.find(item => item.id === id);
        document.getElementById('r-title').innerText = r.title;
        document.getElementById('r-icon').innerText = r.icon;
        document.getElementById('r-ingredients').innerHTML = r.ing.map(i => `<li>${i}</li>`).join('');
        document.getElementById('r-steps').innerText = r.steps;
        document.getElementById('r-tags').innerHTML = r.tags.map(t => `<span class="tag">${t}</span>`).join('');
        document.getElementById('recipeOverlay').style.display = 'flex';
    }

    function closeRecipe() {
        document.getElementById('recipeOverlay').style.display = 'none';
    }

    function addToShop() {
        alert("Added to your shopping list!");
        closeRecipe();
    }

    generateRecipes();
</script>
</body>
</html>
