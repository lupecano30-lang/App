<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serene | Mental Wellness</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --text: #1e272e;
            --accent: #74b9ff;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(-45deg, #a8c0ff, #fbc2eb, #a18cd1, #fad0c4);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            height: 600px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            position: relative;
        }

        nav {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 20px;
        }

        .nav-link {
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 12px;
            transition: 0.3s;
            font-weight: 500;
            color: white;
            font-size: 0.9rem;
        }

        .nav-link.active { background: white; color: var(--text); }

        .view { display: none; flex-grow: 1; color: white; animation: fadeIn 0.5s; }
        .view.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Breathing Tool */
        .breath-ring {
            width: 150px; height: 150px;
            border: 8px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: transform 4s ease-in-out;
        }
        .expand { transform: scale(1.6); border-color: white; }

        /* Journal Tool */
        textarea {
            width: 100%; height: 150px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            color: white;
            padding: 15px;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
        }

        .action-btn {
            background: white; color: var(--text);
            border: none; padding: 12px 30px;
            border-radius: 25px; margin-top: 20px;
            font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .action-btn:hover { transform: scale(1.05); }

        .safety { font-size: 0.7rem; opacity: 0.8; margin-top: auto; padding: 10px; }
    </style>
</head>
<body>

<div class="glass-card">
    <nav>
        <div class="nav-link active" onclick="switchTab('calm', this)">Calm</div>
        <div class="nav-link" onclick="switchTab('reflect', this)">Reflect</div>
        <div class="nav-link" onclick="switchTab('focus', this)">Focus</div>
    </nav>

    <div id="calm" class="view active">
        <div id="ring" class="breath-ring">Hold</div>
        <h2 id="b-text" style="margin-top: 40px;">Ready?</h2>
        <button class="action-btn" onclick="startSession()">Begin Breathing</button>
    </div>

    <div id="reflect" class="view">
        <h2>Release Your Thoughts</h2>
        <textarea id="journalInput" placeholder="What's on your mind?"></textarea>
        <div id="affirmationBox" style="margin-top: 20px; font-style: italic; min-height: 50px;"></div>
        <button class="action-btn" onclick="generateResponse()">Reflect</button>
    </div>

    <div id="focus" class="view">
        <h2 id="stepNum">5</h2>
        <p id="stepText">Things you can see</p>
        <button class="action-btn" onclick="nextFocus()">Got it</button>
    </div>

    <div class="safety">
        Emergency: Call 988. This is a support tool, not medical advice.
    </div>
</div>

<script>
    // Tab System
    function switchTab(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // Pro Breathing Logic
    function startSession() {
        const ring = document.getElementById('ring');
        const text = document.getElementById('b-text');
        const cycle = () => {
            text.innerText = "Inhale"; ring.classList.add('expand');
            setTimeout(() => {
                text.innerText = "Hold";
                setTimeout(() => {
                    text.innerText = "Exhale"; ring.classList.remove('expand');
                    setTimeout(cycle, 4000);
                }, 2000);
            }, 4000);
        };
        cycle();
    }

    // Reflect Logic
    const quotes = [
        "You've survived 100% of your hardest days.",
        "This feeling is a tunnel, not a cave. You are moving through it.",
        "You are not your thoughts; you are the one observing them.",
        "It's okay to be a 'work in progress.'"
    ];
    function generateResponse() {
        const input = document.getElementById('journalInput').value;
        const box = document.getElementById('affirmationBox');
        if(input.length < 5) {
            box.innerText = "Write a little more, then let it go.";
            return;
        }
        box.innerText = "Thank you for sharing. Remember: " + quotes[Math.floor(Math.random() * quotes.length)];
        document.getElementById('journalInput').value = "";
    }

    // Focus Logic
    let focusI = 0;
    const focusSteps = [
        {n: 5, t: "Things you can see"},
        {n: 4, t: "Things you can touch"},
        {n: 3, t: "Things you can hear"},
        {n: 2, t: "Things you can smell"},
        {n: 1, t: "Thing you can taste"}
    ];
    function nextFocus() {
        focusI++;
        if(focusI < focusSteps.length) {
            document.getElementById('stepNum').innerText = focusSteps[focusI].n;
            document.getElementById('stepText').innerText = focusSteps[focusI].t;
        } else {
            document.getElementById('stepNum').innerText = "Done";
            document.getElementById('stepText').innerText = "You are grounded and safe.";
        }
    }
</script>

</body>
</html>
