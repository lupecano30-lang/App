<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preflop Pro | GTO Ranges</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --raise: #eb4d4b;
            --fold: #636e72;
            --text: #ffffff;
        }
        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        select {
            padding: 10px;
            background: var(--card-bg);
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 2px;
            width: 95vw;
            max-width: 600px;
            aspect-ratio: 1;
        }
        .cell {
            background: var(--fold);
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            border-radius: 2px;
            cursor: default;
        }
        .cell.raise { background: var(--raise); }
        .cell.pair { border: 1px solid rgba(255,255,255,0.3); }
        
        .legend {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .color-box { width: 15px; height: 15px; border-radius: 3px; }
    </style>
</head>
<body>

    <h2>Preflop Wizard Lite</h2>
    
    <div class="controls">
        <label>Position: </label>
        <select id="positionSelect" onchange="updateRange()">
            <option value="UTG">UTG (Under the Gun)</option>
            <option value="BTN">BTN (Button)</option>
            <option value="SB">SB (Small Blind)</option>
        </select>
    </div>

    <div class="grid" id="pokerGrid"></div>

    <div class="legend">
        <div class="legend-item"><div class="color-box" style="background:var(--raise)"></div> Raise (RFI)</div>
        <div class="legend-item"><div class="color-box" style="background:var(--fold)"></div> Fold</div>
    </div>

<script>
    const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
    const grid = document.getElementById('pokerGrid');

    // Simplified GTO Opening Ranges (Raise First In)
    const ranges = {
        UTG: ['AA', 'KK', 'QQ', 'JJ', 'TT', '99', '88', '77', 'AKs', 'AQs', 'AJs', 'ATs', 'AKo', 'AQo', 'KQs'],
        BTN: ['AA', 'KK', 'QQ', 'JJ', 'TT', '99', '88', '77', '66', '55', '44', '33', '22', 'AKs', 'AQs', 'AJs', 'ATs', 'A9s', 'A8s', 'A7s', 'A5s', 'KQs', 'KJs', 'KTs', 'K9s', 'QJs', 'QTs', 'JTs', 'T9s', '98s', 'AKo', 'AQo', 'AJo', 'ATo', 'KQo', 'KJo'],
        SB: ['AA', 'KK', 'QQ', 'JJ', 'TT', '99', '88', '77', '66', '55', 'AKs', 'AQs', 'AJs', 'ATs', 'A2s', 'KQs', 'AKo', 'AQo']
    };

    function drawGrid() {
        grid.innerHTML = '';
        const currentPos = document.getElementById('positionSelect').value;
        const currentRange = ranges[currentPos];

        for (let i = 0; i < 13; i++) {
            for (let j = 0; j < 13; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                let hand = '';
                if (i < j) {
                    hand = ranks[i] + ranks[j] + 's'; // Suited
                } else if (i > j) {
                    hand = ranks[j] + ranks[i] + 'o'; // Offsuit
                } else {
                    hand = ranks[i] + ranks[j]; // Pairs
                    cell.classList.add('pair');
                }

                cell.innerText = hand;
                if (currentRange.includes(hand)) {
                    cell.classList.add('raise');
                }
                grid.appendChild(cell);
            }
        }
    }

    function updateRange() {
        drawGrid();
    }

    drawGrid();
</script>
</body>
</html>
