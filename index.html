<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Keto Master | Precise</title>
    <style>
        :root { --leaf: #16a34a; --bg: #f8fafc; --dark: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding-bottom: 90px; }
        
        .header { padding: 25px 20px; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .search-bar { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; box-sizing: border-box; font-size: 16px; margin-top: 10px; outline: none; }

        .recipe-list { padding: 20px; }
        .recipe-item { display: flex; align-items: center; gap: 15px; background: white; padding: 15px; border-radius: 18px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; }
        .recipe-icon { width: 45px; height: 45px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        #recipeOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: flex-end; }
        .overlay-content { background: white; width: 100%; max-height: 90vh; border-radius: 30px 30px 0 0; padding: 30px; box-sizing: border-box; overflow-y: auto; }
        
        .btn-action { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--leaf); color: white; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .instruction-step { margin-bottom: 15px; padding-left: 10px; border-left: 3px solid var(--leaf); font-size: 14px; color: #475569; }
        .desc-text { font-style: italic; color: #64748b; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; border-top: 1px solid #e2e8f0; }
        .nav-item { flex: 1; text-align: center; padding-top: 15px; font-size: 11px; color: #64748b; cursor: pointer; }
        .nav-item.active { color: var(--leaf); font-weight: bold; }
    </style>
</head>
<body>

    <div id="v-recipes" class="view active">
        <div class="header">
            <h2 style="margin:0">Green Keto Library</h2>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search (e.g. Omelette, Shredded)" onkeyup="filterRecipes()">
        </div>
        <div class="recipe-list" id="recipeContainer"></div>
    </div>

    <div id="recipeOverlay" onclick="closeRecipe()">
        <div class="overlay-content" onclick="event.stopPropagation()">
            <div id="r-icon" style="font-size: 40px; margin-bottom: 10px;"></div>
            <h2 id="r-title" style="margin:0"></h2>
            <p id="r-desc" class="desc-text"></p>
            
            <h3>Exact Measurements</h3>
            <ul id="r-ingredients" style="line-height: 1.8; font-weight: 500;"></ul>
            
            <h3>How to Cook</h3>
            <div id="r-steps"></div>
            
            <button class="btn-action" onclick="addToShop()">+ Add to Shopping List</button>
            <button onclick="closeRecipe()" style="width:100%; padding:15px; background:none; border:none; color:#64748b;">Close</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active">🥗<br>Recipes</div>
        <div class="nav-item">🛒<br>Shop</div>
        <div class="nav-item">📈<br>Weight</div>
    </div>

<script>
    // Manually curated precise recipes
    const curatedRecipes = [
        {
            id: 1,
            title: "Warm Omelette over Broccoli",
            desc: "A fluffy, buttery omelette served over tender-crisp broccoli florets. The fats from the olive oil help absorb the vitamins in the greens.",
            icon: "🍳",
            ing: ["3 Large Eggs", "2 cups Fresh Broccoli florets", "1.5 tbsp Extra Virgin Olive Oil", "1/2 tsp Pink Himalayan Salt", "1/4 tsp Black Pepper"],
            steps: [
                "Steam or sauté broccoli in 0.5 tbsp olive oil and a splash of water for 4 mins until tender.",
                "Whisk 3 eggs with a pinch of salt until no streaks remain.",
                "Heat 1 tbsp olive oil in a non-stick pan over medium-low heat.",
                "Pour eggs in; let sit for 30 seconds, then gently push edges toward the center until set but still moist.",
                "Fold the omelette and serve immediately over the bed of broccoli."
            ]
        },
        {
            id: 2,
            title: "Garlic Shredded Chicken over Spinach",
            desc: "Moist, seasoned chicken breast shredded for maximum flavor absorption, served over a bed of wilted, garlicky spinach.",
            icon: "🍗",
            ing: ["6oz Chicken Breast", "3 cups Fresh Baby Spinach", "2 tbsp Extra Virgin Olive Oil", "1 clove Garlic (minced)", "1/2 tsp Pink Salt"],
            steps: [
                "Poach chicken in simmering water for 12 mins, then shred with two forks.",
                "Heat olive oil in a pan; add minced garlic for 30 seconds until fragrant.",
                "Toss shredded chicken in the garlic oil to coat thoroughly.",
                "Add spinach to the pan for only 60 seconds until just wilted.",
                "Plate and finish with an extra drizzle of olive oil for healthy fats."
            ]
        },
        {
            id: 3,
            title: "Crispy Pan-Seared Chicken over Lettuce",
            desc: "Golden-brown chicken thighs provide the high fat content needed for deep ketosis, served with a refreshing, crisp lettuce base.",
            icon: "🍗",
            ing: ["2 Skin-on Chicken Thighs", "2 cups Romaine or Mixed Greens", "1 tbsp Olive Oil (for dressing)", "1/2 tsp Pink Salt", "1/2 Lemon (juiced)"],
            steps: [
                "Pat chicken thighs completely dry to ensure a crispy sear.",
                "Place thighs skin-side down in a cold pan; turn heat to medium and cook for 10-12 mins to render fat.",
                "Flip and cook for 5 more mins until cooked through. Let rest for 3 mins.",
                "Toss lettuce with lemon juice, olive oil, and salt.",
                "Slice chicken and lay over the greens while still warm."
            ]
        }
    ];

    function renderRecipes(list) {
        document.getElementById('recipeContainer').innerHTML = list.map(r => `
            <div class="recipe-item" onclick="openRecipe(${r.id})">
                <div class="recipe-icon">${r.icon}</div>
                <div><b>${r.title}</b><br><small style="color:var(--leaf)">Detailed Guide Available</small></div>
            </div>`).join('');
    }

    function openRecipe(id) {
        const r = curatedRecipes.find(item => item.id === id);
        document.getElementById('r-title').innerText = r.title;
        document.getElementById('r-icon').innerText = r.icon;
        document.getElementById('r-desc').innerText = r.desc;
        document.getElementById('r-ingredients').innerHTML = r.ing.map(i => `<li>${i}</li>`).join('');
        document.getElementById('r-steps').innerHTML = r.steps.map(s => `<div class="instruction-step">${s}</div>`).join('');
        document.getElementById('recipeOverlay').style.display = 'flex';
    }

    function closeRecipe() { document.getElementById('recipeOverlay').style.display = 'none'; }
    function filterRecipes() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        renderRecipes(curatedRecipes.filter(r => r.title.toLowerCase().includes(term)));
    }

    renderRecipes(curatedRecipes);
</script>
</body>
</html>
