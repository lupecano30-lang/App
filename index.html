<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalmSpace | 2026 Grounding Kit</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --primary: #a3c4f3;
            --secondary: #98ddca;
            --text: #2d3436;
            --accent: #ffd3b6;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .app-container {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
        }
        .nav-btn {
            background: #eee;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .nav-btn.active { background: var(--primary); color: white; }
        
        /* View Management */
        .view { display: none; }
        .view.active { display: block; }

        /* Breathing Tool */
        .circle-box { height: 220px; display: flex; align-items: center; justify-content: center; }
        .circle {
            width: 80px; height: 80px;
            background: var(--primary);
            border-radius: 50%;
            transition: all 4s ease-in-out;
            display: flex; align-items: center; justify-content: center; color: white;
        }
        .circle.expand { transform: scale(2.2); background: var(--secondary); }

        /* Grounding Game */
        .grounding-step {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
            font-weight: bold;
        }

        /* Fidget Toy */
        .pop-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .pop-item {
            aspect-ratio: 1;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
        }
        .pop-item:active { transform: scale(0.9); box-shadow: none; opacity: 0.5; }

        .footer { font-size: 11px; margin-top: 30px; opacity: 0.6; line-height: 1.4; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="nav-buttons">
        <button class="nav-btn active" onclick="showView('breath')">Breathe</button>
        <button class="nav-btn" onclick="showView('ground')">Ground</button>
        <button class="nav-btn" onclick="showView('fidget')">Fidget</button>
    </div>

    <div id="breath" class="view active">
        <h2>Steady Breath</h2>
        <div class="circle-box"><div id="ball" class="circle">Wait</div></div>
        <p id="b-text">Ready to begin?</p>
        <button onclick="startBreathing()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:20px;">Start</button>
    </div>

    <div id="ground" class="view">
        <h2>5-4-3-2-1 Technique</h2>
        <div id="groundStep" class="grounding-step">Click start to anchor yourself.</div>
        <button onclick="nextGroundingStep()" id="g-btn" style="background:var(--secondary); border:none; padding:10px 20px; border-radius:20px;">Start Grounding</button>
    </div>

    <div id="fidget" class="view">
        <h2>Digital Pop-It</h2>
        <p>Focus on the sensation of the "pop."</p>
        <div class="pop-grid" id="popGrid"></div>
    </div>

    <div class="footer">
        <strong>Emergency:</strong> Call 988 (US) or your local crisis line.<br>
        Not a clinical replacement.
    </div>
</div>

<script>
    // View Switcher
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        event.target.classList.add('active');
    }

    // Breathing Logic
    function startBreathing() {
        const ball = document.getElementById('ball');
        const text = document.getElementById('b-text');
        const cycle = () => {
            text.innerText = "Inhale..."; ball.classList.add('expand');
            setTimeout(() => {
                text.innerText = "Hold...";
                setTimeout(() => {
                    text.innerText = "Exhale..."; ball.classList.remove('expand');
                    setTimeout(cycle, 4000);
                }, 2000);
            }, 4000);
        };
        cycle();
    }

    // Grounding Logic
    const steps = [
        "Find 5 things you can SEE.",
        "Find 4 things you can TOUCH.",
        "Find 3 things you can HEAR.",
        "Find 2 things you can SMELL.",
        "Find 1 thing you can TASTE."
    ];
    let currentStep = 0;
    function nextGroundingStep() {
        const display = document.getElementById('groundStep');
        const btn = document.getElementById('g-btn');
        if(currentStep < steps.length) {
            display.innerText = steps[currentStep];
            btn.innerText = "Next Step";
            currentStep++;
        } else {
            display.innerText = "You are here. You are safe.";
            btn.style.display = 'none';
        }
    }

    // Fidget Logic
    const grid = document.getElementById('popGrid');
    for(let i=0; i<12; i++) {
        const btn = document.createElement('button');
        btn.className = 'pop-item';
        btn.onclick = () => { /* Add haptic vibration logic here if on mobile */ };
        grid.appendChild(btn);
    }
</script>

</body>
</html>
