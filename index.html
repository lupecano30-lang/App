<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokerWizard | Study Room</title>
    <style>
        :root { --bg: #f8fafc; --dark: #0f172a; --blue: #3b82f6; --pink: #f472b6; --sky: #7dd3fc; --gold: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--dark); padding-bottom: 50px; }
        
        .header { padding: 20px; text-align: center; background: white; border-bottom: 1px solid #e2e8f0; }
        
        /* Dashboard Cards */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .pos-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; position: relative; }
        .pos-name { font-weight: bold; font-size: 14px; margin-bottom: 8px; color: #64748b; }
        .stats-row { display: flex; gap: 5px; justify-content: space-between; }
        .stat-box { background: #eff6ff; border-radius: 6px; flex: 1; padding: 8px 0; text-align: center; font-size: 11px; }
        .stat-box.green { color: #16a34a; }
        .stat-box.red { color: #dc2626; }

        /* Range Modal (The Bottom Sheet) */
        .range-modal {
            background: white; border-top: 1px solid #ddd; border-radius: 20px 20px 0 0;
            padding: 20px; box-shadow: 0 -10px 25px rgba(0,0,0,0.1); margin-top: 20px;
        }
        .modal-title { font-weight: bold; font-size: 18px; }
        .modal-subtitle { color: #64748b; font-size: 13px; margin-bottom: 15px; }

        /* The Grid */
        .range-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px; margin-top: 15px; }
        .hand-cell {
            aspect-ratio: 1; font-size: 7px; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; border-radius: 2px; background: #f1f5f9;
        }
        
        /* Range Colors */
        .raise { background: var(--pink) !important; color: white; }
        .call { background: var(--sky) !important; color: white; }
        .allin { background: var(--gold) !important; color: white; }
        
        /* Legend */
        .legend { display: flex; justify-content: space-around; margin-top: 20px; font-size: 12px; }
        .dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }
    </style>
</head>
<body>

<div class="header">
    <h3>Learn Position</h3>
</div>

<div class="dashboard">
    <div class="pos-card">
        <div class="pos-name">LJ</div>
        <div class="stats-row">
            <div class="stat-box">📦 169</div>
            <div class="stat-box green">✓ 12</div>
            <div class="stat-box red">✕ 2</div>
        </div>
    </div>
    <div class="pos-card">
        <div class="pos-name">HJ</div>
        <div class="stats-row">
            <div class="stat-box">📦 169</div>
            <div class="stat-box green">✓ 0</div>
            <div class="stat-box red">✕ 0</div>
        </div>
    </div>
    <div class="pos-card">
        <div class="pos-name">CO</div>
        <div class="stats-row">
            <div class="stat-box">📦 169</div>
            <div class="stat-box green">✓ 45</div>
            <div class="stat-box red">✕ 5</div>
        </div>
    </div>
    <div class="pos-card">
        <div class="pos-name">BTN</div>
        <div class="stats-row">
            <div class="stat-box">📦 169</div>
            <div class="stat-box green">✓ 89</div>
            <div class="stat-box red">✕ 12</div>
        </div>
    </div>
</div>

<div class="range-modal">
    <div class="modal-title">Three Bet - SB</div>
    <div class="modal-subtitle">Open raise from LJ</div>
    
    <div class="stats-row" style="margin-bottom: 10px;">
        <div class="stat-box">📦 169</div>
        <div class="stat-box green">✓ 0</div>
        <div class="stat-box red">✕ 0</div>
    </div>

    <div class="range-grid" id="studyGrid"></div>

    <div class="legend">
        <span><span class="dot" style="background:var(--pink)"></span> RAISE</span>
        <span><span class="dot" style="background:var(--sky)"></span> CALL</span>
        <span><span class="dot" style="background:var(--gold)"></span> ALL IN</span>
        <span><span class="dot" style="background:#f1f5f9"></span> FOLD</span>
    </div>
</div>

<script>
    const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
    const grid = document.getElementById('studyGrid');

    // Sample 3-Bet Range Logic
    const raiseHands = ['AA', 'KK', 'QQ', 'AKs', 'AKo', 'AQs'];
    const callHands = ['JJ', 'TT', '99', '88', 'AJs', 'ATs', 'KQs', 'AQo'];
    const allInHands = ['77', '66', '55'];

    function buildGrid() {
        for (let i = 0; i < 13; i++) {
            for (let j = 0; j < 13; j++) {
                const cell = document.createElement('div');
                cell.className = 'hand-cell';
                
                let hand = (i < j) ? ranks[i] + ranks[j] + 's' : (i > j) ? ranks[j] + ranks[i] + 'o' : ranks[i] + ranks[j];
                cell.innerText = hand;

                if (raiseHands.includes(hand)) cell.classList.add('raise');
                else if (callHands.includes(hand)) cell.classList.add('call');
                else if (allInHands.includes(hand)) cell.classList.add('allin');

                grid.appendChild(cell);
            }
        }
    }
    buildGrid();
</script>

</body>
</html>
