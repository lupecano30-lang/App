<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Keto Master | Simplified</title>
    <style>
        :root { --leaf: #16a34a; --bg: #f8fafc; --dark: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding-bottom: 90px; }
        
        .header { padding: 25px 20px; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .search-bar { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; box-sizing: border-box; font-size: 16px; margin-top: 10px; outline: none; }

        .recipe-list { padding: 20px; }
        .recipe-item { display: flex; align-items: center; gap: 15px; background: white; padding: 15px; border-radius: 18px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; }
        .recipe-icon { width: 45px; height: 45px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        #recipeOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: flex-end; }
        .overlay-content { background: white; width: 100%; max-height: 90vh; border-radius: 30px 30px 0 0; padding: 30px; box-sizing: border-box; overflow-y: auto; }
        
        .btn-action { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--leaf); color: white; font-weight: bold; margin-top: 20px; cursor: pointer; }
        
        /* Photo Styling */
        .image-container { 
            width: 100%; 
            min-height: 350px; 
            background: #f1f5f9; 
            border-radius: 20px; 
            margin: 20px 0; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .plated-photo { width: 100%; height: 100%; object-fit: cover; display: block; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; border-top: 1px solid #e2e8f0; }
        .nav-item { flex: 1; text-align: center; padding-top: 15px; font-size: 11px; color: #64748b; cursor: pointer; }
        .nav-item.active { color: var(--leaf); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0">Green Keto Library</h2>
        <input type="text" id="searchInput" class="search-bar" placeholder="Search (Chicken, Egg, Spinach...)" onkeyup="filterRecipes()">
    </div>

    <div class="recipe-list" id="recipeContainer"></div>

    <div id="recipeOverlay" onclick="closeRecipe()">
        <div class="overlay-content" onclick="event.stopPropagation()">
            <div id="r-icon" style="font-size: 40px; margin-bottom: 10px;"></div>
            <h2 id="r-title" style="margin:0"></h2>
            
            <h3 style="margin-top: 25px;">Exact Measurements</h3>
            <ul id="r-ingredients" style="line-height: 2.2; font-size: 16px; font-weight: 500;"></ul>
            
            <div class="image-container">
                <img id="r-plate" class="plated-photo" src="" alt="Recipe Visual">
            </div>

            <button class="btn-action" onclick="alert('Ingredients Added!')">+ Add to Shopping List</button>
            <button onclick="closeRecipe()" style="width:100%; padding:15px; background:none; border:none; color:#64748b; font-weight: 600;">Close</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active">🥗<br>Recipes</div>
        <div class="nav-item">🛒<br>Shop</div>
        <div class="nav-item">📈<br>Weight</div>
    </div>

<script>
    const styles = ["Garlic", "Lemon", "Warm", "Crispy", "Roasted"];
    const proteins = [
        { name: "Chicken Breast", icon: "🍗", query: "grilled,chicken,breast" },
        { name: "Omelette Eggs", icon: "🍳", query: "omelette,eggs" },
        { name: "Poached Eggs", icon: "🍳", query: "poached,eggs" }
    ];
    const vegetables = [
        { name: "Spinach", query: "spinach,salad" },
        { name: "Broccoli", query: "broccoli,steamed" },
        { name: "Zucchini", query: "zucchini,noodles" },
        { name: "Kale", query: "kale,salad" }
    ];

    let allRecipes = [];

    function generate() {
        let id = 0;
        styles.forEach(s => proteins.forEach(p => vegetables.forEach(v => {
            allRecipes.push({
                id: id++,
                title: `${s} ${p.name} over ${v.name}`,
                icon: p.icon,
                // Using Unsplash source for much higher quality, relevant food photos
                imgUrl: `https://source.unsplash.com/800x800/?cooked,${p.query},${v.query}`,
                ing: ["6oz Chicken or 3 Eggs", `${v.name} (2-3 cups)`, "2 tbsp Olive Oil", "Pink Himalayan Salt"]
            });
        })));
        renderRecipes(allRecipes);
    }

    function renderRecipes(list) {
        document.getElementById('recipeContainer').innerHTML = list.map(r => `
            <div class="recipe-item" onclick="openRecipe(${r.id})">
                <div class="recipe-icon">${r.icon}</div>
                <div><b>${r.title}</b></div>
            </div>`).join('');
    }

    function openRecipe(id) {
        const r = allRecipes.find(item => item.id === id);
        document.getElementById('r-title').innerText = r.title;
        document.getElementById('r-icon').innerText = r.icon;
        document.getElementById('r-ingredients').innerHTML = r.ing.map(i => `<li>${i}</li>`).join('');
        
        const img = document.getElementById('r-plate');
        // Setting a high-quality food image based on the specific meal
        img.src = r.imgUrl;
        
        document.getElementById('recipeOverlay').style.display = 'flex';
    }

    function closeRecipe() { document.getElementById('recipeOverlay').style.display = 'none'; }
    
    function filterRecipes() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        renderRecipes(allRecipes.filter(r => r.title.toLowerCase().includes(term)));
    }

    generate();
</script>
</body>
</html>
