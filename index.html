<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Keto Master</title>
    <style>
        :root { --leaf: #16a34a; --bg: #f8fafc; --dark: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding-bottom: 90px; }
        
        /* Header & Search */
        .header { padding: 25px 20px; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .search-bar { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; box-sizing: border-box; font-size: 16px; margin-top: 10px; outline: none; }

        /* Views */
        .view { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Recipe Items */
        .recipe-item { display: flex; align-items: center; gap: 15px; background: white; padding: 15px; border-radius: 18px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; }
        .recipe-icon { width: 45px; height: 45px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        /* Overlays */
        #recipeOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: flex-end; }
        .overlay-content { background: white; width: 100%; max-height: 90vh; border-radius: 30px 30px 0 0; padding: 30px; box-sizing: border-box; overflow-y: auto; }
        
        .btn-action { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--leaf); color: white; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; background: #dcfce7; color: #166534; margin-right: 5px; }

        /* Shopping List */
        .shop-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; border-top: 1px solid #e2e8f0; }
        .nav-item { flex: 1; text-align: center; padding-top: 15px; font-size: 11px; color: #64748b; cursor: pointer; }
        .nav-item.active { color: var(--leaf); font-weight: bold; }
    </style>
</head>
<body>

    <div id="v-recipes" class="view active">
        <div class="header" style="margin: -20px -20px 20px -20px;">
            <h2 style="margin:0">Green Keto Library</h2>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search vegetables..." onkeyup="filterRecipes()">
        </div>
        <div id="recipeContainer"></div>
    </div>

    <div id="v-shop" class="view">
        <h2>My Shopping List</h2>
        <div id="shopList">
            <p style="text-align:center; color:#94a3b8; margin-top:40px;">Your list is empty.<br>Add ingredients from recipes!</p>
        </div>
        <button class="btn-action" style="background:#ef4444; margin-top:40px;" onclick="clearShop()">Clear All</button>
    </div>

    <div id="v-weight" class="view">
        <h2>Weight Journey</h2>
        <div style="background:white; padding:30px; border-radius:20px; text-align:center;">
            <p style="margin:0; color:#64748b;">Current Progress</p>
            <h1 style="font-size:48px; color:var(--leaf); margin:10px 0;">-12.4 <small style="font-size:18px">lbs</small></h1>
            <div style="width:100%; height:10px; background:#f1f5f9; border-radius:5px;">
                <div style="width:68%; height:100%; background:var(--leaf); border-radius:5px;"></div>
            </div>
            <p style="font-size:12px; margin-top:10px;">Goal: -18 lbs</p>
        </div>
    </div>

    <div id="recipeOverlay" onclick="closeRecipe()">
        <div class="overlay-content" onclick="event.stopPropagation()">
            <div id="r-icon" style="font-size: 40px; margin-bottom: 10px;"></div>
            <h2 id="r-title" style="margin:0"></h2>
            <div id="r-tags" style="margin: 10px 0 20px 0;"></div>
            <h3>Ingredients</h3>
            <ul id="r-ingredients" style="line-height: 1.8;"></ul>
            <button class="btn-action" onclick="addToShop()">+ Add to Shopping List</button>
            <button onclick="closeRecipe()" style="width:100%; padding:15px; background:none; border:none; color:#64748b;">Close</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="nav('v-recipes', this)">🥗<br>Recipes</div>
        <div class="nav-item" onclick="nav('v-shop', this)">🛒<br>Shop</div>
        <div class="nav-item" onclick="nav('v-weight', this)">📈<br>Weight</div>
    </div>

<script>
    const styles = ["Warm", "Zesty", "Garlic", "Crispy", "Steamed"];
    const proteins = ["Grilled Chicken", "Shredded Chicken", "Omelette Style Eggs", "Poached Eggs"];
    const greens = ["Spinach", "Lettuce Mix", "Broccoli", "Mixed Greens", "Kale", "Zucchini"];
    
    let allRecipes = [];
    let shoppingList = JSON.parse(localStorage.getItem('ketoShop')) || [];

    function generate() {
        let id = 0;
        styles.forEach(s => proteins.forEach(p => greens.forEach(g => {
            allRecipes.push({ id: id++, title: `${s} ${p} over ${g}`, icon: p.includes("Chicken") ? "🍗" : "🍳", ing: [p, g, "Olive Oil", "Pink Salt"] });
        })));
        renderRecipes(allRecipes);
        updateShopUI();
    }

    function renderRecipes(list) {
        document.getElementById('recipeContainer').innerHTML = list.map(r => `
            <div class="recipe-item" onclick="openRecipe(${r.id})">
                <div class="recipe-icon">${r.icon}</div>
                <div><b>${r.title}</b></div>
            </div>`).join('');
    }

    let activeRecipeIng = [];
    function openRecipe(id) {
        const r = allRecipes.find(item => item.id === id);
        activeRecipeIng = r.ing;
        document.getElementById('r-title').innerText = r.title;
        document.getElementById('r-icon').innerText = r.icon;
        document.getElementById('r-ingredients').innerHTML = r.ing.map(i => `<li>${i}</li>`).join('');
        document.getElementById('recipeOverlay').style.display = 'flex';
    }

    function addToShop() {
        activeRecipeIng.forEach(item => { if(!shoppingList.includes(item)) shoppingList.push(item); });
        localStorage.setItem('ketoShop', JSON.stringify(shoppingList));
        updateShopUI();
        alert("Ingredients added to Shop!");
        closeRecipe();
    }

    function updateShopUI() {
        const container = document.getElementById('shopList');
        if(shoppingList.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:#94a3b8; margin-top:40px;">Your list is empty.</p>`;
            return;
        }
        container.innerHTML = shoppingList.map(item => `
            <div class="shop-item"><span>${item}</span> <input type="checkbox"></div>
        `).join('');
    }

    function clearShop() { shoppingList = []; localStorage.setItem('ketoShop', '[]'); updateShopUI(); }
    function closeRecipe() { document.getElementById('recipeOverlay').style.display = 'none'; }
    function filterRecipes() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        renderRecipes(allRecipes.filter(r => r.title.toLowerCase().includes(term)));
    }
    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    generate();
</script>
</body>
</html>
